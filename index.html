<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torrey Database</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:     #f5f0e8;
      --parchment: #ede6d6;
      --border:    #c9b99a;
      --brown:     #5c3d1e;
      --burgundy:  #7a2030;
      --text:      #2c1f0e;
      --muted:     #7a6a55;
      --tag-bg:    #e4d8c4;
      --tag-text:  #4a2e0e;
      --link:      #7a2030;
      --shadow:    rgba(60,30,0,.12);
      --admin-bg:  #1e1a16;
      --admin-surface: #2a2420;
      --admin-border:  #3d3530;
      --admin-text:    #e8dfd0;
      --admin-muted:   #9a8a7a;
      --admin-accent:  #c4783a;
      --admin-danger:  #c0392b;
      --admin-width:   500px;
    }
    body { font-family: Georgia,'Times New Roman',serif; background:var(--cream); color:var(--text); min-height:100vh; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: var(--brown); color: var(--cream);
      padding: 1.5rem 2rem; text-align: center;
      border-bottom: 3px solid var(--burgundy); position: relative;
    }
    header h1 { font-size:1.9rem; font-weight:normal; letter-spacing:.04em; margin-bottom:.25rem; }
    header p  { font-size:.85rem; color:#c9b99a; font-style:italic; }
    .admin-header-btn {
      position:absolute; right:1.5rem; top:50%; transform:translateY(-50%);
      background:transparent; border:1px solid rgba(201,185,154,.45);
      color:#c9b99a; padding:.3rem .7rem; font-family:Georgia,serif;
      font-size:.78rem; cursor:pointer; border-radius:3px; transition:background .15s;
    }
    .admin-header-btn:hover { background:rgba(255,255,255,.08); }
    .admin-header-btn.active { background:var(--admin-accent); border-color:var(--admin-accent); color:#fff; }

    /* ── App wrapper ───────────────────────────────────────────────────────── */
    #app-wrapper { display:flex; align-items:flex-start; }
    #main-content { flex:1; min-width:0; }

    /* ── Search ────────────────────────────────────────────────────────────── */
    .search-section { max-width:700px; margin:2.5rem auto 0; padding:0 1rem; }
    .mode-toggle {
      display:flex; border:1px solid var(--border); border-radius:4px 4px 0 0;
      overflow:hidden; background:var(--parchment);
    }
    .mode-toggle button {
      flex:1; padding:.6rem 1rem; border:none; background:transparent;
      font-family:Georgia,serif; font-size:.9rem; cursor:pointer; color:var(--muted);
      transition:background .15s,color .15s; border-right:1px solid var(--border);
    }
    .mode-toggle button:last-child { border-right:none; }
    .mode-toggle button.active { background:var(--brown); color:var(--cream); }
    .search-bar {
      display:flex; border:1px solid var(--border); border-top:none;
      border-radius:0 0 4px 4px; overflow:hidden; background:white;
    }
    .search-bar input {
      flex:1; padding:.75rem 1rem; border:none; font-family:Georgia,serif;
      font-size:1rem; color:var(--text); background:white; outline:none;
    }
    .search-bar input::placeholder { color:var(--muted); font-style:italic; }
    .search-bar button {
      padding:.75rem 1.25rem; background:var(--burgundy); color:white;
      border:none; font-family:Georgia,serif; font-size:.9rem; cursor:pointer; transition:background .15s;
    }
    .search-bar button:hover { background:var(--brown); }

    /* ── Results list ──────────────────────────────────────────────────────── */
    #results-list { max-width:700px; margin:.5rem auto 0; padding:0 1rem; }
    .result-item {
      padding:.75rem 1rem; border:1px solid var(--border); border-top:none;
      background:white; cursor:pointer; transition:background .1s;
    }
    .result-item:first-child { border-top:1px solid var(--border); }
    .result-item:hover { background:var(--parchment); }
    .result-item .r-title { font-size:1rem; }
    .result-item .r-sub   { font-size:.82rem; color:var(--muted); margin-top:.15rem; font-style:italic; }
    .no-results { padding:1rem; text-align:center; color:var(--muted); font-style:italic; font-size:.9rem; }

    /* ── Detail panel ──────────────────────────────────────────────────────── */
    #detail { max-width:860px; margin:2rem auto 4rem; padding:0 1rem; }
    .detail-card { background:white; border:1px solid var(--border); border-radius:4px; box-shadow:0 2px 8px var(--shadow); overflow:hidden; }
    .detail-header { background:var(--parchment); border-bottom:1px solid var(--border); padding:1.5rem 2rem; }
    .detail-header h2 { font-size:1.5rem; font-weight:normal; color:var(--brown); }
    .detail-header .subtitle { font-size:.9rem; color:var(--muted); margin-top:.3rem; font-style:italic; }
    .detail-header .office-link {
      display:inline-block; margin-top:.75rem; padding:.4rem .9rem;
      background:var(--burgundy); color:white; text-decoration:none;
      font-size:.85rem; border-radius:3px; font-style:normal;
    }
    .detail-header .office-link:hover { background:var(--brown); }
    .detail-body { padding:1.5rem 2rem; }
    .section { margin-bottom:2rem; }
    .section:last-child { margin-bottom:0; }
    .section-title {
      font-size:.75rem; font-weight:bold; letter-spacing:.1em; text-transform:uppercase;
      color:var(--muted); border-bottom:1px solid var(--border); padding-bottom:.4rem; margin-bottom:1rem;
    }
    .professor-list { display:flex; flex-direction:column; gap:.75rem; }
    .professor-entry { display:flex; align-items:baseline; gap:.75rem; flex-wrap:wrap; }
    .professor-name { color:var(--link); text-decoration:underline; cursor:pointer; font-size:.95rem; }
    .professor-name:hover { color:var(--brown); }
    .professor-genres { font-size:.8rem; color:var(--muted); font-style:italic; }
    .oh-link {
      font-size:.78rem; color:var(--burgundy); text-decoration:none;
      border:1px solid var(--burgundy); border-radius:3px; padding:.1rem .45rem; white-space:nowrap;
    }
    .oh-link:hover { background:var(--burgundy); color:white; }
    .lecture-list { display:flex; flex-direction:column; gap:1rem; }
    .lecture-entry { border-left:3px solid var(--border); padding-left:1rem; }
    .lecture-entry .lec-title { font-size:.95rem; color:var(--text); }
    .lecture-entry a.lec-title { color:var(--link); text-decoration:none; }
    .lecture-entry a.lec-title:hover { text-decoration:underline; }
    .lecture-entry .lec-meta { font-size:.8rem; color:var(--muted); margin-top:.2rem; font-style:italic; }
    .lecture-entry .lec-books { margin-top:.35rem; display:flex; flex-wrap:wrap; gap:.35rem; }
    .book-chip {
      background:var(--tag-bg); color:var(--tag-text); font-size:.78rem;
      padding:.15rem .5rem; border-radius:3px; border:1px solid var(--border);
      cursor:pointer; font-style:normal;
    }
    .book-chip:hover { background:var(--parchment); }
    .back-btn { display:inline-block; margin-bottom:1rem; color:var(--muted); font-size:.85rem; cursor:pointer; text-decoration:underline; }
    .back-btn:hover { color:var(--brown); }
    .loading   { color:var(--muted); font-style:italic; padding:1rem 0; }
    .error-msg { color:var(--burgundy); font-style:italic; padding:1rem 0; }

    /* ════════════════════════════════════════════════════════════════════════
       ADMIN PANEL
    ════════════════════════════════════════════════════════════════════════ */
    #admin-panel {
      width: var(--admin-width); min-width: var(--admin-width);
      background: var(--admin-bg); color: var(--admin-text);
      border-left: 2px solid var(--admin-border);
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      display: none; flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #admin-panel.visible { display: flex; }

    .ap-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 1rem; background:var(--admin-surface);
      border-bottom:1px solid var(--admin-border); flex-shrink:0;
    }
    .ap-header span { font-size:.85rem; font-weight:600; color:var(--admin-accent); letter-spacing:.05em; text-transform:uppercase; }
    .ap-logout {
      background:transparent; border:1px solid var(--admin-border); color:var(--admin-muted);
      padding:.25rem .6rem; font-size:.75rem; cursor:pointer; border-radius:3px;
    }
    .ap-logout:hover { border-color:var(--admin-danger); color:var(--admin-danger); }

    .ap-chpw-body {
      display:none; padding:.65rem 1rem .75rem;
      border-bottom:1px solid var(--admin-border); background:var(--admin-bg); flex-shrink:0;
    }
    .ap-chpw-body.visible { display:block; }
    .ap-chpw-body .form-group label { font-size:.72rem; }
    .ap-chpw-body .form-input { padding:.28rem .5rem; font-size:.8rem; }
    .ap-chpw-msg { font-size:.73rem; min-height:1rem; }
    .ap-chpw-msg.ok  { color:#7ec8a4; }
    .ap-chpw-msg.err { color:var(--admin-danger); }

    .ap-tabs {
      display:flex; border-bottom:1px solid var(--admin-border); flex-shrink:0;
    }
    .ap-tab {
      flex:1; padding:.55rem .4rem; background:transparent; border:none;
      color:var(--admin-muted); font-size:.78rem; cursor:pointer; transition:color .15s,background .15s;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    .ap-tab:hover { color:var(--admin-text); }
    .ap-tab.active { color:var(--admin-accent); border-bottom:2px solid var(--admin-accent); background:rgba(196,120,58,.07); }

    .ap-toolbar {
      display:flex; gap:.5rem; padding:.75rem 1rem; border-bottom:1px solid var(--admin-border);
      flex-shrink:0;
    }
    .ap-filter {
      flex:1; background:var(--admin-surface); border:1px solid var(--admin-border);
      color:var(--admin-text); padding:.4rem .6rem; font-size:.8rem; border-radius:3px; outline:none;
    }
    .ap-filter::placeholder { color:var(--admin-muted); }
    .ap-filter:focus { border-color:var(--admin-accent); }
    .ap-add-btn {
      background:var(--admin-accent); color:white; border:none; padding:.4rem .8rem;
      font-size:.78rem; cursor:pointer; border-radius:3px; white-space:nowrap;
    }
    .ap-add-btn:hover { filter:brightness(1.1); }

    .ap-list { flex:1; overflow-y:auto; padding:.5rem 0; }
    .ap-item {
      display:flex; align-items:center; gap:.5rem;
      padding:.55rem 1rem; border-bottom:1px solid var(--admin-border);
      transition:background .1s;
    }
    .ap-item:hover { background:var(--admin-surface); }
    .ap-item-info { flex:1; min-width:0; }
    .ap-item-title { font-size:.82rem; color:var(--admin-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ap-item-sub   { font-size:.72rem; color:var(--admin-muted); margin-top:.1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ap-item-badge {
      font-size:.68rem; background:rgba(196,120,58,.2); color:var(--admin-accent);
      padding:.1rem .35rem; border-radius:2px; white-space:nowrap; flex-shrink:0;
    }
    .ap-edit-btn, .ap-del-btn {
      background:transparent; border:1px solid var(--admin-border); color:var(--admin-muted);
      padding:.2rem .45rem; font-size:.72rem; cursor:pointer; border-radius:3px; flex-shrink:0;
    }
    .ap-edit-btn:hover { border-color:var(--admin-accent); color:var(--admin-accent); }
    .ap-del-btn:hover  { border-color:var(--admin-danger); color:var(--admin-danger); }
    .ap-loading { padding:2rem 1rem; text-align:center; color:var(--admin-muted); font-size:.85rem; }

    /* ── Admin Modal ───────────────────────────────────────────────────────── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.65);
      display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem;
    }
    .modal-box {
      background:var(--admin-surface); border:1px solid var(--admin-border);
      border-radius:6px; width:100%; max-width:560px; max-height:90vh;
      display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,.5);
    }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 1.25rem; border-bottom:1px solid var(--admin-border); flex-shrink:0;
    }
    .modal-header h3 { font-size:.95rem; font-weight:600; color:var(--admin-text); font-family:-apple-system,sans-serif; }
    .modal-close {
      background:transparent; border:none; color:var(--admin-muted); font-size:1.3rem;
      cursor:pointer; line-height:1; padding:.1rem .3rem;
    }
    .modal-close:hover { color:var(--admin-text); }
    .modal-body { flex:1; overflow-y:auto; padding:1.25rem; }
    .modal-footer {
      display:flex; gap:.5rem; justify-content:flex-end;
      padding:.9rem 1.25rem; border-top:1px solid var(--admin-border); flex-shrink:0;
    }
    .btn-cancel {
      background:transparent; border:1px solid var(--admin-border); color:var(--admin-muted);
      padding:.45rem .9rem; font-size:.82rem; cursor:pointer; border-radius:3px;
    }
    .btn-cancel:hover { color:var(--admin-text); border-color:var(--admin-text); }
    .btn-save {
      background:var(--admin-accent); color:white; border:none;
      padding:.45rem 1rem; font-size:.82rem; cursor:pointer; border-radius:3px;
    }
    .btn-save:hover { filter:brightness(1.1); }
    .btn-danger {
      background:var(--admin-danger); color:white; border:none;
      padding:.45rem 1rem; font-size:.82rem; cursor:pointer; border-radius:3px;
    }
    .btn-danger:hover { filter:brightness(1.1); }

    /* ── Form elements ─────────────────────────────────────────────────────── */
    .form-group { margin-bottom:1rem; }
    .form-group label {
      display:block; font-size:.75rem; color:var(--admin-muted); margin-bottom:.35rem;
      text-transform:uppercase; letter-spacing:.05em;
    }
    .form-group label small { text-transform:none; letter-spacing:0; font-size:.75rem; color:var(--admin-accent); }
    .form-input {
      width:100%; background:var(--admin-bg); border:1px solid var(--admin-border);
      color:var(--admin-text); padding:.5rem .7rem; font-size:.85rem; border-radius:3px; outline:none;
    }
    .form-input:focus { border-color:var(--admin-accent); }
    .form-input::placeholder { color:var(--admin-muted); }
    .req-star { color:#e06c6c; margin-left:.2rem; }
    .req-note { font-size:.72rem; color:var(--admin-muted); margin-top:.8rem; font-style:italic; }
    .id-preview {
      background:var(--admin-bg); border:1px solid var(--admin-border); border-radius:3px;
      padding:.5rem .7rem; font-size:.85rem; color:var(--admin-accent); font-family:monospace;
      letter-spacing:.08em;
    }
    .id-warn { font-size:.75rem; color:var(--admin-danger); margin-top:.3rem; }
    .form-check { display:flex; align-items:center; gap:.5rem; cursor:pointer; }
    .form-check input { width:14px; height:14px; accent-color:var(--admin-accent); cursor:pointer; }
    .form-check span { font-size:.85rem; color:var(--admin-text); }

    /* ── Multi-select ──────────────────────────────────────────────────────── */
    .ms-wrap { border:1px solid var(--admin-border); border-radius:3px; overflow:hidden; }
    .ms-filter {
      width:100%; background:var(--admin-surface); border:none; border-bottom:1px solid var(--admin-border);
      color:var(--admin-text); padding:.4rem .6rem; font-size:.78rem; outline:none;
    }
    .ms-filter::placeholder { color:var(--admin-muted); }
    .ms-list { max-height:160px; overflow-y:auto; background:var(--admin-bg); }
    .ms-item {
      display:flex; align-items:center; gap:.5rem; padding:.35rem .7rem;
      cursor:pointer; transition:background .1s;
    }
    .ms-item:hover { background:var(--admin-surface); }
    .ms-item input { accent-color:var(--admin-accent); flex-shrink:0; }
    .ms-item span  { font-size:.78rem; color:var(--admin-text); }
    .ms-empty { padding:.5rem .7rem; font-size:.78rem; color:var(--admin-muted); font-style:italic; }

    /* ── Typeahead select ──────────────────────────────────────────────────── */
    .ts-wrap { position:relative; border:1px solid var(--admin-border); border-radius:3px; background:var(--admin-bg); min-height:36px; padding:4px; }
    .ts-chips { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
    .ts-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(196,120,58,.15); color:var(--admin-accent); font-size:.73rem; padding:.18rem .45rem; border-radius:3px; border:1px solid rgba(196,120,58,.3); }
    .ts-chip-remove { background:transparent; border:none; color:var(--admin-muted); cursor:pointer; font-size:.9rem; padding:0; line-height:1; }
    .ts-chip-remove:hover { color:var(--admin-danger); }
    .ts-input { background:transparent; border:none; color:var(--admin-text); font-size:.82rem; outline:none; width:100%; padding:.25rem .3rem; }
    .ts-input::placeholder { color:var(--admin-muted); }
    .ts-dropdown { position:absolute; left:-1px; right:-1px; top:calc(100% + 1px); background:var(--admin-surface); border:1px solid var(--admin-accent); border-radius:0 0 3px 3px; z-index:200; max-height:180px; overflow-y:auto; }
    .ts-option { padding:.38rem .7rem; font-size:.78rem; color:var(--admin-text); cursor:pointer; transition:background .1s; }
    .ts-option:hover { background:var(--admin-bg); color:var(--admin-accent); }
    .ts-no-results { padding:.38rem .7rem; font-size:.78rem; color:var(--admin-muted); font-style:italic; }
    .ts-create-option { color:var(--admin-accent); border-top:1px solid var(--admin-border); font-style:italic; }

    /* ── Admin login modal ─────────────────────────────────────────────────── */
    #login-modal .modal-box { max-width:340px; }
    .login-error { color:var(--admin-danger); font-size:.8rem; margin-top:.5rem; }
  </style>
</head>
<body>

<header>
  <h1>Torrey Database</h1>
  <p>Books &bull; Lectures &bull; Faculty</p>
  <button class="admin-header-btn" id="admin-header-btn" onclick="adminHeaderClick()">Admin</button>
</header>

<div id="app-wrapper">
  <!-- ── Main public content ── -->
  <div id="main-content">
    <div class="search-section">
      <div class="mode-toggle">
        <button id="btn-books" class="active" onclick="setMode('books')">Search Books</button>
        <button id="btn-professors" onclick="setMode('professors')">Search Professors</button>
        <button id="btn-lectures" onclick="setMode('lectures')">Search Lectures</button>
      </div>
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="Search by title or author…" autocomplete="off" />
        <button onclick="doSearch()">Search</button>
        <button onclick="seeAll()" style="background:transparent;border:1px solid var(--border);color:var(--brown);padding:.45rem .9rem;font-family:Georgia,serif;font-size:.9rem;cursor:pointer;border-radius:2px;">See All</button>
      </div>
    </div>
    <div id="results-list"></div>
    <div id="detail"></div>
  </div>

  <!-- ── Admin side panel ── -->
  <div id="admin-panel">
    <div class="ap-header">
      <span>Admin Panel</span>
      <div style="display:flex;gap:.4rem;align-items:center">
        <button class="ap-logout" id="chpw-toggle" onclick="toggleChpw()">Change Password</button>
        <button class="ap-logout" onclick="adminLogout()">Log Out</button>
      </div>
    </div>
    <div class="ap-chpw-body" id="chpw-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;align-items:end">
        <div class="form-group" style="margin:0">
          <label>Current Password</label>
          <input class="form-input" id="chpw-current" type="password" autocomplete="current-password" />
        </div>
        <div class="form-group" style="margin:0">
          <label>New Password</label>
          <input class="form-input" id="chpw-new" type="password" autocomplete="new-password" />
        </div>
        <div class="form-group" style="margin:0">
          <label>Confirm New</label>
          <input class="form-input" id="chpw-confirm" type="password" autocomplete="new-password"
                 onkeydown="if(event.key==='Enter')submitChpw()" />
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.7rem;margin-top:.5rem">
        <button class="ap-add-btn" onclick="submitChpw()">Update Password</button>
        <div class="ap-chpw-msg" id="chpw-msg"></div>
      </div>
    </div>
    <div class="ap-tabs">
      <button class="ap-tab active" data-tab="books"      onclick="setAdminTab('books')">Books</button>
      <button class="ap-tab"        data-tab="professors"  onclick="setAdminTab('professors')">Professors</button>
      <button class="ap-tab"        data-tab="lectures"    onclick="setAdminTab('lectures')">Lectures</button>
      <button class="ap-tab"        data-tab="genres"      onclick="setAdminTab('genres')">Genres</button>
    </div>
    <div class="ap-toolbar">
      <input class="ap-filter" id="ap-filter" type="text" placeholder="Filter…" oninput="filterAdminList(this.value)" />
      <button class="ap-add-btn" onclick="openAddModal()">+ Add New</button>
    </div>
    <div class="ap-list" id="ap-list"></div>
  </div>
</div>

<!-- ── Admin login modal ── -->
<div id="login-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Admin Login</h3>
      <button class="modal-close" onclick="closeLoginModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" id="login-pw" type="password" placeholder="Enter admin password"
               onkeydown="if(event.key==='Enter')submitLogin()" />
        <div class="login-error" id="login-error"></div>
        <div style="margin-top:.5rem">
          <button type="button" onclick="forgotPassword()"
                  style="background:none;border:none;color:var(--admin-muted);font-size:.75rem;cursor:pointer;padding:0;text-decoration:underline;">
            Forgot password?
          </button>
          <span id="forgot-msg" style="font-size:.75rem;margin-left:.5rem"></span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
      <button class="btn-save" onclick="submitLogin()">Log In</button>
    </div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  PUBLIC SEARCH
// ════════════════════════════════════════════════════════════════════════════

let searchMode = 'books';

function setMode(m) {
  searchMode = m;
  document.getElementById('btn-books').classList.toggle('active', m === 'books');
  document.getElementById('btn-professors').classList.toggle('active', m === 'professors');
  document.getElementById('btn-lectures').classList.toggle('active', m === 'lectures');
  document.getElementById('search-input').placeholder =
    m === 'books'      ? 'Search by title or author…' :
    m === 'professors' ? 'Search by professor name…'  :
                         'Search by title or lecturer…';
  document.getElementById('results-list').innerHTML = '';
  document.getElementById('detail').innerHTML = '';
  document.getElementById('search-input').focus();
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const listEl   = document.getElementById('results-list');
  const detailEl = document.getElementById('detail');
  listEl.innerHTML   = '<div class="no-results loading">Searching…</div>';
  detailEl.innerHTML = '';

  const ep = searchMode === 'books'
    ? `/api/books?search=${encodeURIComponent(q)}`
    : searchMode === 'professors'
    ? `/api/professors?search=${encodeURIComponent(q)}`
    : `/api/lectures?search=${encodeURIComponent(q)}`;

  try {
    const data = await (await fetch(ep)).json();
    if (!data.length) { listEl.innerHTML = '<div class="no-results">No results found.</div>'; return; }
    listEl.innerHTML = data.map(item =>
      searchMode === 'books'
        ? `<div class="result-item" onclick="showBook('${esc(item.id)}')">
             <div class="r-title">${esc(item.title)}</div>
             <div class="r-sub">${esc(item.author || '')}</div>
           </div>`
        : searchMode === 'professors'
        ? `<div class="result-item" onclick="showProfessor('${esc(item.id)}')">
             <div class="r-title">${esc(item.name)}</div>
             <div class="r-sub">Current faculty</div>
           </div>`
        : `<div class="result-item" onclick="showLecture('${esc(item.id)}')">
             <div class="r-title">${esc(item.title)}</div>
             <div class="r-sub">${esc(item.professor || 'Unknown lecturer')}${item.dates ? ' &bull; ' + esc(item.dates) : ''}</div>
           </div>`
    ).join('');
  } catch (err) {
    listEl.innerHTML = `<div class="no-results error-msg">Error: ${err.message}</div>`;
  }
}

async function seeAll() {
  document.getElementById('search-input').value = '';
  const listEl   = document.getElementById('results-list');
  const detailEl = document.getElementById('detail');
  listEl.innerHTML   = '<div class="no-results loading">Loading…</div>';
  detailEl.innerHTML = '';

  const ep = searchMode === 'books'
    ? '/api/books?all=1'
    : searchMode === 'professors'
    ? '/api/professors?all=1'
    : '/api/lectures?all=1';

  try {
    const data = await (await fetch(ep)).json();
    if (!data.length) { listEl.innerHTML = '<div class="no-results">Nothing found.</div>'; return; }
    const bibleBtn = searchMode === 'books'
      ? `<div style="padding:.4rem .6rem .2rem"><button onclick="showBibleBooks()" style="background:transparent;border:1px solid var(--border);color:var(--brown);padding:.3rem .7rem;font-family:Georgia,serif;font-size:.8rem;cursor:pointer;border-radius:2px;">Show Only Bible Books</button></div>`
      : '';
    listEl.innerHTML = bibleBtn + data.map(item =>
      searchMode === 'books'
        ? `<div class="result-item" onclick="showBook('${esc(item.id)}')">
             <div class="r-title">${esc(item.title)}</div>
             <div class="r-sub">${esc(item.author || '')}</div>
           </div>`
        : searchMode === 'professors'
        ? `<div class="result-item" onclick="showProfessor('${esc(item.id)}')">
             <div class="r-title">${esc(item.name)}</div>
             <div class="r-sub">Current faculty</div>
           </div>`
        : `<div class="result-item" onclick="showLecture('${esc(item.id)}')">
             <div class="r-title">${esc(item.title)}</div>
             <div class="r-sub">${esc(item.professor || 'Unknown lecturer')}${item.dates ? ' &bull; ' + esc(item.dates) : ''}</div>
           </div>`
    ).join('');
  } catch (err) {
    listEl.innerHTML = `<div class="no-results error-msg">Error: ${err.message}</div>`;
  }
}

const BIBLE_ORDER = [
  'Genesis','Exodus','Leviticus','Numbers','Deuteronomy',
  'Joshua','Judges','Ruth','1 Samuel','2 Samuel',
  '1 Kings','2 Kings','1 Chronicles','2 Chronicles',
  'Ezra','Nehemiah','Esther','Job','Psalms','Proverbs',
  'Ecclesiastes','Song of Solomon','Song of Songs','Isaiah','Jeremiah',
  'Lamentations','Ezekiel','Daniel','Hosea','Joel','Amos',
  'Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah',
  'Haggai','Zechariah','Malachi',
  'Matthew','Mark','Luke','John','Acts','Romans',
  '1 Corinthians','2 Corinthians','Galatians','Ephesians',
  'Philippians','Colossians','1 Thessalonians','2 Thessalonians',
  '1 Timothy','2 Timothy','Titus','Philemon','Hebrews',
  'James','1 Peter','2 Peter','1 John','2 John','3 John',
  'Jude','Revelation'
];

function bibleBookIndex(title) {
  const t = title.trim().toLowerCase();
  let bestIdx = -1, bestLen = 0;
  BIBLE_ORDER.forEach((b, i) => {
    const bl = b.toLowerCase();
    if (t.includes(bl) && bl.length > bestLen) { bestIdx = i; bestLen = bl.length; }
  });
  return bestIdx === -1 ? Infinity : bestIdx;
}

async function showBibleBooks() {
  const listEl   = document.getElementById('results-list');
  const detailEl = document.getElementById('detail');
  listEl.innerHTML   = '<div class="no-results loading">Loading…</div>';
  detailEl.innerHTML = '';
  try {
    const data = await (await fetch('/api/books?all=1&bible=1')).json();
    data.sort((a, b) => bibleBookIndex(a.title) - bibleBookIndex(b.title));
    const backBtn = `<div style="padding:.4rem .6rem .2rem"><button onclick="seeAll()" style="background:transparent;border:1px solid var(--border);color:var(--brown);padding:.3rem .7rem;font-family:Georgia,serif;font-size:.8rem;cursor:pointer;border-radius:2px;">← Show All Books</button></div>`;
    if (!data.length) { listEl.innerHTML = backBtn + '<div class="no-results">No Bible books found.</div>'; return; }
    listEl.innerHTML = backBtn + data.map(item =>
      `<div class="result-item" onclick="showBook('${esc(item.id)}')">
         <div class="r-title">${esc(item.title)}</div>
         <div class="r-sub">${esc(item.author || '')}</div>
       </div>`
    ).join('');
  } catch (err) {
    listEl.innerHTML = `<div class="no-results error-msg">Error: ${err.message}</div>`;
  }
}

async function showBook(id) {
  const detailEl = document.getElementById('detail');
  detailEl.innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('results-list').innerHTML = '';
  window.scrollTo({ top: detailEl.offsetTop - 20, behavior: 'smooth' });
  try {
    const b = await (await fetch(`/api/books/${encodeURIComponent(id)}`)).json();
    const professorSection = b.connectedProfessors.length
      ? `<div class="section">
           <div class="section-title">Connected Faculty</div>
           <div class="professor-list">
             ${b.connectedProfessors.map(p => `
               <div class="professor-entry">
                 <span class="professor-name" onclick="showProfessor('${esc(p.id)}')">${esc(p.name)}</span>
                 <span class="professor-genres">${p.genres.map(g => esc(g.genre_name)).join(', ')}</span>
                 ${p.office_hours ? `<a class="oh-link" href="${esc(p.office_hours)}" target="_blank" rel="noopener">Book Office Hours</a>` : ''}
               </div>`).join('')}
           </div>
         </div>` : '';

    const lectureSection = b.lectures.length
      ? `<div class="section">
           <div class="section-title">Lectures (${b.lectures.length})</div>
           <div class="lecture-list">
             ${b.lectures.map(l => `
               <div class="lecture-entry">
                 ${l.link
                   ? `<a class="lec-title" href="${esc(l.link)}" target="_blank" rel="noopener">${esc(l.title)}</a>`
                   : `<span class="lec-title">${esc(l.title)}</span>`}
                 <div class="lec-meta">${esc(l.dates||'')}${l.dates&&l.professor?' &bull; ':''}${esc(l.professor||'')}</div>
               </div>`).join('')}
           </div>
         </div>` : '';

    detailEl.innerHTML = `
      <span class="back-btn" onclick="clearDetail()">← Back to results</span>
      <div class="detail-card">
        <div class="detail-header">
          <h2>${esc(b.title)}</h2>
          <div class="subtitle">${esc(b.author || '')}</div>
        </div>
        <div class="detail-body">
          ${professorSection}${lectureSection}
          ${!professorSection && !lectureSection ? '<div class="loading">No additional information available.</div>' : ''}
        </div>
      </div>`;
  } catch (err) {
    detailEl.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
  }
}

async function showProfessor(id) {
  const detailEl = document.getElementById('detail');
  detailEl.innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('results-list').innerHTML = '';
  window.scrollTo({ top: detailEl.offsetTop - 20, behavior: 'smooth' });
  try {
    const p = await (await fetch(`/api/professors/${encodeURIComponent(id)}`)).json();
    const genreSection = p.genres.length

           <div class="section-title">Areas of Speciality</div>

    const lectureSection = p.lectures.length
      ? `<div class="section">
           <div class="section-title">Lectures (${p.lectures.length})</div>
           <div class="lecture-list">
             ${p.lectures.map(l => `
               <div class="lecture-entry">
                 ${l.link
                   ? `<a class="lec-title" href="${esc(l.link)}" target="_blank" rel="noopener">${esc(l.title)}</a>`

async function showLecture(id) {
  const detailEl = document.getElementById('detail');
  detailEl.innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('results-list').innerHTML = '';
  window.scrollTo({ top: detailEl.offsetTop - 20, behavior: 'smooth' });

    const l = await (await fetch(`/api/lectures/${encodeURIComponent(id)}`)).json();

    const bookSection = l.books.length
      ? `<div class="section">
           <div class="section-title">Connected Books</div>
           <div style="display:flex;flex-wrap:wrap;gap:.4rem">
             ${l.books.map(b =>
               `<span class="book-chip" onclick="showBook('${esc(b.id)}')" title="${esc(b.author||'')}">${esc(b.title)}</span>`
             ).join('')}

    const metaLine = [

      l.dates ? `<span>${esc(l.dates)}</span>` : null
    ].filter(Boolean).join(' &bull; ');

    detailEl.innerHTML = `
      <span class="back-btn" onclick="clearDetail()">← Back to results</span>

        <div class="detail-header">

function clearDetail() {
  document.getElementById('detail').innerHTML = '';
  doSearch();
}

// ════════════════════════════════════════════════════════════════════════════
//  ADMIN AUTH
// ════════════════════════════════════════════════════════════════════════════

let adminToken = null;
let adminTab   = 'books';
let adminListData = [];   // current full list for the active tab
let refCache = {};        // cached reference lists
let colLimits = {};       // column character limits from DB schema

function adminHeaderClick() {
  if (adminToken) adminLogout();
  else openLoginModal();
}

function openLoginModal() {
  document.getElementById('login-pw').value    = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('forgot-msg').textContent  = '';
  document.getElementById('forgot-msg').style.color  = '';
  document.getElementById('login-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('login-pw').focus(), 50);
}

async function forgotPassword() {
  const msgEl = document.getElementById('forgot-msg');
  msgEl.style.color = '';
  msgEl.textContent = 'Sending…';
  try {
    const res  = await fetch('/api/forgot-password', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { msgEl.style.color = 'var(--admin-danger)'; msgEl.textContent = data.error; return; }
    msgEl.style.color = '#7ec8a4';
    msgEl.textContent = 'Password sent to emmawillsd@gmail.com.';
  } catch {
    msgEl.style.color = 'var(--admin-danger)';
    msgEl.textContent = 'Connection error.';
  }
}
function closeLoginModal() {
  document.getElementById('login-modal').style.display = 'none';
}

async function submitLogin() {
  const pw = document.getElementById('login-pw').value;
  try {
    const res  = await fetch('/api/admin/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) {
      document.getElementById('login-error').textContent = 'Incorrect password.';
      return;
    }
    const data = await res.json();
    adminToken = data.token;
    closeLoginModal();
    document.getElementById('admin-panel').classList.add('visible');
    document.getElementById('admin-header-btn').classList.add('active');
    document.getElementById('admin-header-btn').textContent = 'Admin ✓';
    try {
      const limRes = await adminFetch('/api/admin/column-limits');
      colLimits = await limRes.json();
      console.log('[colLimits] status:', limRes.status, 'data:', JSON.stringify(colLimits));
    } catch(e) { console.error('[colLimits] fetch failed:', e); colLimits = {}; }
    loadAdminTab(adminTab);
  } catch (err) {
    document.getElementById('login-error').textContent = 'Connection error.';
  }
}

async function adminLogout() {
  if (adminToken) {
    await adminFetch('/api/admin/logout', { method: 'POST' }).catch(() => {});
    adminToken = null;
    refCache   = {};
  }
  document.getElementById('admin-panel').classList.remove('visible');
  document.getElementById('admin-header-btn').classList.remove('active');
  document.getElementById('admin-header-btn').textContent = 'Admin';
  // collapse change-password section on logout
  document.getElementById('chpw-body').classList.remove('visible');
  document.getElementById('chpw-toggle').classList.remove('open');
  ['chpw-current','chpw-new','chpw-confirm'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('chpw-msg').textContent = '';
}

function toggleChpw() {
  document.getElementById('chpw-body').classList.toggle('visible');
  document.getElementById('chpw-msg').textContent = '';
}

async function submitChpw() {
  const current = document.getElementById('chpw-current').value;
  const newPw   = document.getElementById('chpw-new').value;
  const confirm = document.getElementById('chpw-confirm').value;
  const msgEl   = document.getElementById('chpw-msg');
  msgEl.className = 'ap-chpw-msg';
  msgEl.textContent = '';

  if (!current || !newPw || !confirm) { msgEl.className='ap-chpw-msg err'; msgEl.textContent='All fields are required.'; return; }
  if (newPw !== confirm)               { msgEl.className='ap-chpw-msg err'; msgEl.textContent='New passwords do not match.'; return; }
  if (newPw.length < 4)                { msgEl.className='ap-chpw-msg err'; msgEl.textContent='New password must be at least 4 characters.'; return; }

  try {
    await adminFetch('/api/admin/change-password', {
      method: 'POST',
      body: JSON.stringify({ currentPassword: current, newPassword: newPw })
    });
    msgEl.className = 'ap-chpw-msg ok';
    msgEl.textContent = 'Password updated successfully.';
    ['chpw-current','chpw-new','chpw-confirm'].forEach(id => document.getElementById(id).value = '');
  } catch (err) {
    msgEl.className = 'ap-chpw-msg err';
    msgEl.textContent = err.message || 'Error updating password.';
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  ADMIN HELPERS
// ════════════════════════════════════════════════════════════════════════════

function adminFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'x-admin-token': adminToken, ...(opts.headers||{}) },
    body: opts.body ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
  });
}

async function fetchRef(type) {
  if (!refCache[type]) {
    refCache[type] = await (await adminFetch(`/api/admin/ref/${type}`)).json();
  }
  return refCache[type];
}
function invalidateRef(type) { delete refCache[type]; }

async function nextId(type) {
  return (await (await adminFetch(`/api/admin/next-id/${type}`)).json()).id;
}

// ════════════════════════════════════════════════════════════════════════════
//  ADMIN TABS
// ════════════════════════════════════════════════════════════════════════════

function setAdminTab(tab) {
  adminTab = tab;
  document.querySelectorAll('.ap-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('ap-filter').value = '';
  loadAdminTab(tab);
}

async function loadAdminTab(tab) {
  const listEl = document.getElementById('ap-list');
  listEl.innerHTML = '<div class="ap-loading">Loading…</div>';
  try {
    const data = await (await adminFetch(`/api/admin/${tab}`)).json();
    adminListData = data;
    renderAdminList(data);
  } catch (err) {
    listEl.innerHTML = `<div class="ap-loading" style="color:var(--admin-danger)">Error: ${err.message}</div>`;
  }
}

function filterAdminList(q) {
  q = q.toLowerCase();
  const filtered = q
    ? adminListData.filter(item => {
        const searchable = [item.title, item.name, item.author, item.professor, item.dates]
          .filter(Boolean).join(' ').toLowerCase();
        return searchable.includes(q);
      })
    : adminListData;
  renderAdminList(filtered);
}

function renderAdminList(data) {
  const listEl = document.getElementById('ap-list');
  if (!data.length) { listEl.innerHTML = '<div class="ap-loading">No items found.</div>'; return; }

  listEl.innerHTML = data.map(item => {
    if (adminTab === 'books') {
      const sub = `${esc(item.author || '')} · ${item.genre_count} genre${item.genre_count!==1?'s':''} · ${item.lecture_count} lecture${item.lecture_count!==1?'s':''}`;
      return apItem(item.id, item.title, sub, '');
    }
    if (adminTab === 'professors') {
      const badge = item.is_current ? '● Current' : '';
      const sub   = `${item.genre_count} genre${item.genre_count!==1?'s':''}`;
      return apItem(item.id, item.name, sub, badge);
    }
    if (adminTab === 'lectures') {
      const sub = `${esc(item.professor||'')} · ${esc(item.dates||'')} · ${item.book_count} book${item.book_count!==1?'s':''}`;
      return apItem(item.id, item.title, sub, '');
    }
    if (adminTab === 'genres') {
      const sub = `${item.book_count} book${item.book_count!==1?'s':''} · ${item.professor_count} professor${item.professor_count!==1?'s':''}`;
      return apItem(item.id, item.name, sub, '');
    }
    return '';
  }).join('');
}

function apItem(id, title, sub, badge) {
  return `<div class="ap-item">
    <div class="ap-item-info">
      <div class="ap-item-title">${esc(title)}</div>
      <div class="ap-item-sub">${sub}</div>
    </div>
    ${badge ? `<span class="ap-item-badge">${esc(badge)}</span>` : ''}
    <button class="ap-edit-btn" onclick="openEditModal('${esc(id)}')">Edit</button>
    <button class="ap-del-btn"  onclick="openDeleteConfirm('${esc(id)}')">Del</button>
  </div>`;
}

let editingId   = null;  // null = adding new

function generateBookId(author, title, isBible) {
  let authorPart;
  if (isBible || !author.trim()) {
    authorPart = 'UNK';
  } else {
    const lastName = (author.includes(',') ? author.split(',')[0] : author).trim();
    authorPart = lastName
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-zA-Z]/g, '').substring(0, 3).toUpperCase();
  }

  let t = title.trim();
  if (/^the\s/i.test(t)) t = t.slice(4);
  else if (/^a\s/i.test(t)) t = t.slice(2);

  const titlePart = t
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-zA-Z]/g, '').substring(0, 5).toUpperCase();

  return authorPart + titlePart;
}

  const id = generateBookId(author, title, isBible);
  preview.textContent = id;
  warn.textContent = '';
  if (id.length === 8) {
    const { exists } = await (await adminFetch(`/api/admin/check-book-id/${id}`)).json();
    if (exists) warn.textContent = '⚠ This ID already exists. Adjust the title or author slightly.';
  }

    } else {

      const { exists } = await (await adminFetch(`/api/admin/check-book-id/${id}`)).json();

  pendingDeleteId = id;

  let msg = `Delete "<strong>${esc(label)}</strong>"?`;

    msg += ' This will also delete all lectures by this professor and their book associations.<br><br><em>Deleting a professor also deletes all lectures they have made. If a professor is retiring or changing positions, please just edit them so they are no longer current rather than deleting them entirely. Thank you!</em>';
  } else if (adminTab === 'books') {
    msg += ' This will also remove all genre and lecture links for this book.';

async function executeDelete(id) {
  closeConfirm();

    await adminFetch(`/api/admin/${adminTab}/${encodeURIComponent(id)}`, { method: 'DELETE' });

    if (adminTab === 'books')      { invalidateRef('books'); }
    if (adminTab === 'professors') { invalidateRef('professors'); invalidateRef('current-professors'); }
    if (adminTab === 'lectures')   { invalidateRef('lectures'); }
    if (adminTab === 'genres')     { invalidateRef('genres'); }
    loadAdminTab(adminTab);
  } catch (err) { alert('Error deleting: ' + err.message); }
}

//  MULTI-SELECT COMPONENT
// ════════════════════════════════════════════════════════════════════════════

function buildMultiSelect(name, items, selectedIds) {
  const selSet = new Set(selectedIds.map(String));
  return `<div class="ms-wrap">
    <input class="ms-filter" type="text" placeholder="Filter…" oninput="filterMs(this)" />
    <div class="ms-list">
      ${items.length
        ? items.map(item => `
          <label class="ms-item">
            <input type="checkbox" class="ms-cb" name="${name}" value="${esc(String(item.id))}"
                   ${selSet.has(String(item.id)) ? 'checked' : ''} />
            <span>${esc(item.label)}</span>
          </label>`).join('')
        : '<div class="ms-empty">No items available.</div>'}
    </div>
  </div>`;
}

function filterMs(input) {
  const q = input.value.toLowerCase();
  input.nextElementSibling.querySelectorAll('.ms-item').forEach(el => {
    el.style.display = el.querySelector('span').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function getMultiSelectValues(name) {
  return Array.from(document.querySelectorAll(`input.ms-cb[name="${name}"]:checked`))
    .map(cb => cb.value);
}

// ══════════════════════════════════════════════════════════════════════════
//  TYPEAHEAD SELECT COMPONENT
// ════════════════════════════════════════════════════════════════════════════

const tsCache = {}; // stores items per field name

function buildTypeaheadSelect(name, items, selectedIds) {
  tsCache[name] = items;
  const selSet  = new Set(selectedIds.map(String));
  const chips   = items.filter(i => selSet.has(String(i.id)));

  return `<div class="ts-wrap" data-name="${name}" data-selected="${esc(JSON.stringify(chips.map(c => ({ id: String(c.id), label: c.label }))))}">
    <div class="ts-chips" id="ts-chips-${name}">
      ${chips.map(c => tsChipHtml(name, String(c.id), c.label)).join('')}
    </div>
    <input class="ts-input" type="text" placeholder="Type to search…"
           oninput="tsSearch(this, '${name}')"
           onfocus="tsSearch(this, '${name}')"
           autocomplete="off" />
    <div class="ts-dropdown" id="ts-drop-${name}" style="display:none"></div>
  </div>`;
}

function tsChipHtml(name, id, label) {
  return `<span class="ts-chip">
    ${esc(label)}
    <button type="button" class="ts-chip-remove"
            data-name="${name}" data-id="${esc(id)}"
            onclick="tsRemove(this)">×</button>
  </span>`;
}

function tsSearch(input, name) {
  const q     = input.value.toLowerCase();
  const items = tsCache[name] || [];
  const wrap  = document.querySelector(`.ts-wrap[data-name="${name}"]`);
  if (!wrap) return;
  const selected  = JSON.parse(wrap.dataset.selected || '[]');
  const selIds    = new Set(selected.map(s => s.id));
  const drop      = document.getElementById(`ts-drop-${name}`);

  if (!q) { drop.style.display = 'none'; return; }

  const matches = items
    .filter(item => !selIds.has(String(item.id)) && item.label.toLowerCase().includes(q))
    .slice(0, 15);

  if (!matches.length) {
    drop.innerHTML = `<div class="ts-no-results">No results</div>`;
  } else {
    drop.innerHTML = matches.map(item =>
      `<div class="ts-option"
            data-id="${esc(String(item.id))}"
            data-label="${esc(item.label)}"
            data-name="${name}"
            onmousedown="tsSelect(this)">
        ${esc(item.label)}
       </div>`
    ).join('');
  }
  drop.style.display = '';
}

function tsSelect(optEl) {
  const name  = optEl.dataset.name;
  const id    = optEl.dataset.id;
  const label = optEl.dataset.label;
  const wrap  = document.querySelector(`.ts-wrap[data-name="${name}"]`);
  if (!wrap) return;

  const selected = JSON.parse(wrap.dataset.selected || '[]');
  if (!selected.find(s => s.id === id)) {
    selected.push({ id, label });
    wrap.dataset.selected = JSON.stringify(selected);
  }
  document.getElementById(`ts-chips-${name}`).innerHTML =
    selected.map(s => tsChipHtml(name, s.id, s.label)).join('');

  const input = wrap.querySelector('.ts-input');
  input.value = '';
  document.getElementById(`ts-drop-${name}`).style.display = 'none';
}

function tsRemove(btn) {
  const name = btn.dataset.name;
  const id   = btn.dataset.id;
  const wrap = document.querySelector(`.ts-wrap[data-name="${name}"]`);
  if (!wrap) return;

  const selected = JSON.parse(wrap.dataset.selected || '[]').filter(s => s.id !== id);
  wrap.dataset.selected = JSON.stringify(selected);
  document.getElementById(`ts-chips-${name}`).innerHTML =
    selected.map(s => tsChipHtml(name, s.id, s.label)).join('');
}

function getTypeaheadValues(name) {
  const wrap = document.querySelector(`.ts-wrap[data-name="${name}"]`);
  if (!wrap) return [];
  return JSON.parse(wrap.dataset.selected || '[]').map(s => s.id);
}

// ── Single-select typeahead (one value, e.g. professor on a lecture) ─────────
const stCache = {};

function buildSingleTypeahead(name, items, selectedId, opts = {}) {
  stCache[name] = items;
  const sel = selectedId ? items.find(i => String(i.id) === String(selectedId)) : null;
  const chipHtml = sel
    ? `<span class="ts-chip">${esc(sel.label)}<button type="button" class="ts-chip-remove" data-name="${name}" onclick="stClear(this)">×</button></span>`
    : '';
  const allowCreate = opts.allowCreate ? ' data-allow-create="1"' : '';
  return `<div class="ts-wrap" data-name="${name}" data-selected="${sel ? esc(String(sel.id)) : ''}" data-single="1"${allowCreate}>
    <input class="ts-input" id="st-input-${name}" type="text"
           placeholder="Type to search…"
           oninput="stSearch(this,'${name}')" onfocus="stSearch(this,'${name}')"
           autocomplete="off" style="${sel ? 'display:none' : ''}" />
    <div id="st-chip-${name}">${chipHtml}</div>
    <div class="ts-dropdown" id="st-drop-${name}" style="display:none"></div>
  </div>`;
}

function stSearch(input, name) {
  const q     = input.value.toLowerCase();
  const qRaw  = input.value.trim();
  const items = stCache[name] || [];
  const drop  = document.getElementById(`st-drop-${name}`);
  if (!q.trim()) { drop.style.display = 'none'; return; }
  const matches = items.filter(i => i.label.toLowerCase().includes(q)).slice(0, 15);
  const wrap = document.querySelector(`.ts-wrap[data-name="${name}"][data-single]`);
  const allowCreate = wrap && wrap.dataset.allowCreate;
  let html = matches.map(i => `<div class="ts-option" data-id="${esc(String(i.id))}" data-label="${esc(i.label)}" data-name="${name}" onmousedown="stSelect(this)">${esc(i.label)}</div>`).join('');
  if (!html) html = `<div class="ts-no-results">No results</div>`;
  if (allowCreate && qRaw) {
    const exactMatch = items.some(i => i.label.toLowerCase() === q);
    if (!exactMatch) {
      html += `<div class="ts-option ts-create-option" data-name="${name}" onmousedown="stCreateNew('${name}')">＋ Create new professor: "${esc(qRaw)}"</div>`;
    }
  }
  drop.innerHTML = html;
  drop.style.display = '';
}

function stSelect(optEl) {
  const name  = optEl.dataset.name;
  const id    = optEl.dataset.id;
  const label = optEl.dataset.label;
  const wrap  = document.querySelector(`.ts-wrap[data-name="${name}"][data-single]`);
  if (!wrap) return;
  wrap.dataset.selected = id;
  document.getElementById(`st-input-${name}`).style.display = 'none';
  document.getElementById(`st-chip-${name}`).innerHTML =
    `<span class="ts-chip">${esc(label)}<button type="button" class="ts-chip-remove" data-name="${name}" onclick="stClear(this)">×</button></span>`;
  document.getElementById(`st-drop-${name}`).style.display = 'none';
}

async function stCreateNew(name) {
  const input   = document.getElementById(`st-input-${name}`);
  const profName = input.value.trim();
  if (!profName) return;
  try {
    const idRes = await fetch('/api/admin/next-id/professor', { headers: { 'x-admin-token': adminToken } });
    const { id } = await idRes.json();
    const createRes = await fetch('/api/admin/professors', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ id, name: profName, is_current: false, genre_ids: [] })
    });
    if (!createRes.ok) throw new Error('Failed to create professor');
    const newProf = { id, label: profName };
    stCache[name] = [...(stCache[name] || []), newProf];
    const wrap = document.querySelector(`.ts-wrap[data-name="${name}"][data-single]`);
    wrap.dataset.selected = id;
    input.style.display = 'none';
    document.getElementById(`st-chip-${name}`).innerHTML =
      `<span class="ts-chip">${esc(profName)}<button type="button" class="ts-chip-remove" data-name="${name}" onclick="stClear(this)">×</button></span>`;
    document.getElementById(`st-drop-${name}`).style.display = 'none';
  } catch (err) {
    alert('Error creating professor: ' + err.message);
  }
}

function stClear(btn) {
  const name = btn.dataset.name;
  const wrap = document.querySelector(`.ts-wrap[data-name="${name}"][data-single]`);
  if (!wrap) return;
  wrap.dataset.selected = '';
  document.getElementById(`st-chip-${name}`).innerHTML = '';
  const input = document.getElementById(`st-input-${name}`);
  input.style.display = '';
  input.value = '';
  input.focus();
}

function getSingleTypeaheadValue(name) {
  const wrap = document.querySelector(`.ts-wrap[data-name="${name}"][data-single]`);
  return wrap ? (wrap.dataset.selected || '') : '';
}

// Close any open typeahead dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.ts-wrap')) {
    document.querySelectorAll('.ts-dropdown').forEach(d => d.style.display = 'none');
  }
});

// Apply maxlength to inputs based on DB column limits.
// map: { inputId: [tableName, columnName] }
function applyMaxlengths(map) {
  console.log('[applyMaxlengths] colLimits:', JSON.stringify(colLimits), 'map:', JSON.stringify(map));
  for (const [inputId, [table, col]] of Object.entries(map)) {
    const tblData = colLimits[table] || {};
    const key   = Object.keys(tblData).find(k => k.toLowerCase() === col.toLowerCase());
    const limit = key ? Number(tblData[key]) : 0;
    const el    = document.getElementById(inputId);
    console.log(`  ${inputId} → ${table}.${col}: limit=${limit}, el=${el ? 'found' : 'NOT FOUND'}`);
    if (limit && el) el.maxLength = limit;
  }
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
